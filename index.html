<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Adam & Nessy Wedding Seating</title>

<style>

@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=Parisienne&display=swap');

body {
    margin: 0;
    padding: 0;
    font-family: 'Cormorant Garamond', serif;
    background-color: #f8f8f5;
    color: #5f6f5a;

    background-image:
        url('https://www.transparenttextures.com/patterns/paper-fibers.png');

    min-height: 100vh;
}

.container {

z-index: 1;
    .container * {
    position: relative;
    z-index: 2;
}
    
    max-width: 500px;
    margin: 40px auto;
    padding: 60px 30px 140px;
    text-align: center;
    background: rgba(255,255,255,0.85);

    border-radius: 24px;

    box-shadow:
        0 10px 30px rgba(0,0,0,0.06);

    position: relative;
    overflow: visible;
}

/* TOP LEFT FLORAL */
.container::before {

    content: "";

    position: absolute;

    top: -10px;
    left: -10px;

    width: 240px;
    height: 240px;

    background-image: url('top-left.png');

    background-size: 100% auto;
    background-repeat: no-repeat;

    opacity: 0.42;

    pointer-events: none;

    z-index: 1;
}

/* BOTTOM WATERCOLOR FLORAL */
.container::after {

    content: "";

    position: absolute;

    left: 0;
    bottom: 0;

    width: 100%;
    height: 220px;

    background-image: url('./bottom-right.png');

    background-repeat: no-repeat;

    background-position: center bottom;

    background-size: 100% auto;

    opacity: 0.42;

    pointer-events: none;

    z-index: 1;
}

.date {
    letter-spacing: 2px;
    font-size: 0.95rem;
    margin-bottom: 12px;
    color: #7c8c76;
}

h1 {
    font-family: 'Parisienne', cursive;
    font-size: 3rem;
    line-height: 1.2;
    margin-bottom: 10px;
    color: #5f6f5a;
}

.welcome-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.8rem;
    font-weight: 400;
    margin-bottom: 10px;
    color: #6f7d69;
}

.couple-names {
    font-family: 'Parisienne', cursive;
    font-size: 3.2rem;
    line-height: 1.1;
    margin-bottom: 45px;
    color: #5f6f5a;
}

.ampersand {
    font-size: 3rem;
    margin: 8px 0;
}
    
.subtitle {
    font-size: 1.45rem;
    margin-bottom: 35px;
    color: #6f7d69;
}

.search-box {
    width: 100%;
    padding: 16px;
    font-size: 1.1rem;

    border:
        1px solid #d8e0d4;

    border-radius: 14px;

    background: #ffffff;

    box-sizing: border-box;

    font-family:
        'Cormorant Garamond',
        serif;

    transition: 0.3s ease;
}

.search-box:focus {
    outline: none;

    border-color:
        #9caf96;

    box-shadow:
        0 0 10px rgba(156,175,150,0.2);
}

.results {
    margin-top: 12px;
    text-align: left;
}

.result-item {
    background: white;
    padding: 14px;
    border-radius: 10px;
    margin-bottom: 8px;
    cursor: pointer;

    transition: 0.2s ease;

    border:
        1px solid #eef1eb;
}

.result-item:hover {
    background: #f1f5ef;
}

.result-box {
    margin-top: 30px;

    background:
        linear-gradient(
            180deg,
            #ffffff,
            #f7faf5
        );

    border-radius: 20px;

    padding: 30px;

    box-shadow:
        0 6px 18px rgba(0,0,0,0.05);

    animation: fadeIn 0.4s ease;
}

.result-box h2 {
    font-size: 2rem;
    margin-bottom: 10px;
}

.result-box p {
    font-size: 1.3rem;
}

.footer {
    margin-top: 40px;
    font-size: 1rem;
    color: #8a9485;
}

.creator-credit {

    margin-top: 14px;

    font-size: 0.85rem;

    color: #a0a79b;

    letter-spacing: 0.5px;
}

@keyframes fadeIn {

    from {
        opacity: 0;
        transform: translateY(10px);
    }

    to {
        opacity: 1;
        transform: translateY(0);
    }
}

@media screen and (max-width: 600px) {

    .container {

        margin: 20px;

        padding: 35px 20px;
    }

    h1 {

        font-size: 2.5rem;
    }

    .result-box h2 {

        font-size: 1.7rem;
    }

    /* MOBILE TOP FLORAL */

    .container::before {

        width: 180px;
        height: 180px;

        top: -5px;
        left: -5px;

        opacity: 0.14;
    }

    /* MOBILE BOTTOM FLORAL */

    body::after {

        height: 180px;

        opacity: 0.18;

        background-size: cover;
    }

    /* MOBILE NAME SIZE */

    .couple-names {

        font-size: 3.2rem;
    }

    /* MOBILE SUBTITLE */

    .subtitle {

        font-size: 1.25rem;

        line-height: 1.4;
    }
}

</style>
</head>

<body>

<div class="container">

<div class="date">
16 JULY 2026
</div>

<h1 class="welcome-text">
    Welcome to the wedding of
</h1>

<div class="couple-names">
    Adam Jackson
    <div class="ampersand">&</div>
    Nessy Kipuw

<p class="subtitle">

</p>

<input 
type="text" 
id="search"
class="search-box"
placeholder="Start typing your name..."
autocomplete="on"
/>

<datalist id="guestSuggestions"></datalist>
    
<div class="results" id="results"></div>

<div class="result-box" id="resultBox" style="display:none;">

    <p id="tableNumber"></p>
</div>

<div class="footer">
Thank you for celebrating with us ♡
</div>

<div class="creator-credit">
Webpage created with ♡ by Nessy Kipuw
</div>

</div>

];

const searchInput = document.getElementById('search');
const resultsDiv = document.getElementById('results');
const resultBox = document.getElementById('resultBox');
const suggestionList = document.getElementById('guestSuggestions');

function populateSuggestions() {

    suggestionList.innerHTML = '';

    guests.forEach(guest => {

        const option = document.createElement('option');

        option.value = guest.name;

        suggestionList.appendChild(option);
    });
}

populateSuggestions();

function searchGuest() {

    const query = searchInput.value.trim().toLowerCase();

    resultsDiv.innerHTML = '';

    if (query.length === 0) {
        resultBox.style.display = 'none';
        return;
    }

    const exactMatch = guests.find(guest =>
        guest.name.toLowerCase() === query
    );

    if (exactMatch) {

        document.getElementById('guestName').textContent =
            `Welcome, ${exactMatch.name}!`;

        document.getElementById('tableNumber').textContent =
            `You are seated at ${exactMatch.table}.`;

        resultBox.style.display = 'block';

        return;
    }

    const partialMatches = guests.filter(guest =>
        guest.name.toLowerCase().includes(query)
    );

    partialMatches.forEach(match => {

        const div = document.createElement('div');

        div.classList.add('result-item');

        div.textContent = match.name;

        div.onclick = () => {

            searchInput.value = match.name;

            document.getElementById('guestName').textContent =
                `Welcome, ${match.name}!`;

            document.getElementById('tableNumber').textContent =
                `You are seated at ${match.table}.`;

            resultBox.style.display = 'block';

            resultsDiv.innerHTML = '';
        };

        resultsDiv.appendChild(div);
    });

    if (partialMatches.length === 0) {

        resultBox.style.display = 'none';

        resultsDiv.innerHTML =
            '<div class="result-item">No guest found</div>';
    }
}

searchInput.addEventListener('input', searchGuest);

</script>

</body>
</html>
