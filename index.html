    color: #5f6f5a;
    margin: 0;
    padding: 0;

.container {
    max-width: 500px;
    margin: auto;
    padding: 40px 20px;

    font-size: 2.4rem;
    font-weight: normal;
    margin-bottom: 10px;

}

    padding: 15px;
    font-size: 18px;
    border: 1px solid #cfd8cc;
    border-radius: 12px;
    box-sizing: border-box;
}

.results {
    margin-top: 10px;
    text-align: left;
}

.result-item {
    background: white;
    padding: 12px;
    border-bottom: 1px solid #eee;
    cursor: pointer;
}

.result-item:hover {
    background: #f1f5ef;
}

.result-box {
    margin-top: 30px;
    background: white;
    border-radius: 16px;
    padding: 25px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.05);
}

.flower {
    font-size: 2rem;
    margin-bottom: 15px;

.footer {

    font-size: 0.9rem;

</p>

id="search"
class="search-box"
placeholder="Start typing your name..."

const searchInput = document.getElementById('search');
const resultsDiv = document.getElementById('results');
const resultBox = document.getElementById('resultBox');
const suggestionList = document.getElementById('guestSuggestions');

function populateSuggestions() {

    suggestionList.innerHTML = '';

    guests.forEach(guest => {

        const option = document.createElement('option');

        option.value = guest.name;

        suggestionList.appendChild(option);
    });
}

populateSuggestions();

function searchGuest() {

    const query = searchInput.value.trim().toLowerCase();

    resultsDiv.innerHTML = '';

    if (query.length === 0) {
        resultBox.style.display = 'none';
        return;
    }

    const exactMatch = guests.find(guest =>
        guest.name.toLowerCase() === query
    );

    if (exactMatch) {

        document.getElementById('guestName').textContent =
            `Welcome, ${exactMatch.name}!`;

        document.getElementById('tableNumber').textContent =
            `You are seated at ${exactMatch.table}.`;

        resultBox.style.display = 'block';

        return;
    }

    const partialMatches = guests.filter(guest =>
        guest.name.toLowerCase().includes(query)
    );

    partialMatches.forEach(match => {

        const div = document.createElement('div');

        div.classList.add('result-item');

        div.textContent = match.name;

        div.onclick = () => {

            searchInput.value = match.name;

            document.getElementById('guestName').textContent =
                `Welcome, ${match.name}!`;

            document.getElementById('tableNumber').textContent =
                `You are seated at ${match.table}.`;

            resultBox.style.display = 'block';

            resultsDiv.innerHTML = '';
        };

        resultsDiv.appendChild(div);
    });

    if (partialMatches.length === 0) {

        resultBox.style.display = 'none';

        resultsDiv.innerHTML =
            '<div class="result-item">No guest found</div>';
    }
}

searchInput.addEventListener('input', searchGuest);
